architecture:
  input_size: 50
  hidden_size: 50
  hidden_layers: 5
  output_size: 10
  threshold: 0.5
  leak: 1.0
  override: false
  network_struct: S
  device: cuda
  simulator: ON

training:
  kernel: OFF                   # ON → use the compiled CRSC CUDA kernel for LIF forward pass.
                                # Requires: python src/learning/setup.py build_ext --inplace
  loss_function: CrossEntropy
  optimizer: Adam
  epochs: 2
  iterations_per_epoch: 100
  timesteps: 25
  batch_size: 128
  beta: 0.95
  nap_times: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  num_classes: 10
  # TRADES robustness training — penalises the network for changing its prediction under input corruption.
  # Loss = CrossEntropy(clean) + lambda * KL(clean || adversarial).
  trades_enabled: true          # Enable TRADES during training. Adds ~(trades_steps * 2) forward passes per batch.

  trades_epsilon: 0.05          # Perturbation budget: max allowed input corruption per element.
                                # Range: 0.001 (near-imperceptible) → 0.3 (heavy corruption).

  trades_lambda: 4.0            # Balances clean accuracy vs robustness. Higher = more robust, lower clean accuracy.
                                # Range: 1.0 (favour clean accuracy) → 10.0 (favour robustness).

  trades_steps: 3              # PGD iterations used to find worst-case input per batch. Recommended: 10 for training.
                                # Range: 1 (fast, weaker adversarial) → 40 (slow, strongest adversarial).

  activity_reg_enabled: true   # Two-sided per-neuron activity regularization on hidden LIF layers.
  activity_reg_min_rate: 0.01   # Penalize neurons firing less than 1% of timesteps  (dead neuron prevention).
  activity_reg_max_rate: 0.50   # Penalize neurons firing more than 50% of timesteps (saturation prevention).
  activity_reg_lambda_low: 0.1  # Penalty weight for dead neurons.
  activity_reg_lambda_high: 0.1 # Penalty weight for saturated neurons.

  num_workers: 6                # CPU DataLoader workers that prefetch batches while the GPU trains.
                                # More workers reduce GPU starvation between batches (better utilisation).
                                # Recommended: 4–8 on a workstation. Capped by CPU count automatically.
                                # Set to 0 to disable multiprocessing (needed for non-picklable transforms).

  stdp_enabled: true           # STDP causal correlation loss alongside BPTT.
  stdp_tau: 20.0                # Trace decay time constant in timesteps. Higher = longer memory of past spikes.
  stdp_a_plus: 0.01             # LTP strength — how strongly to reinforce causal (pre→post) spike order.
  stdp_a_minus: 0.01            # LTD strength — how strongly to penalise anticausal (post→pre) spike order.
  
compiler:
  torch_compile: false      # true → wrap model with torch.compile() (TorchInductor kernel fusion).
                            # First run is slower (compilation overhead); subsequent runs are faster.

dataset:
  dataset_name: MNIST
  data_path:

output:
  output_dir: ./outputs
  plot_dir: ./outputs/plots
  data_dir: ./outputs/data
