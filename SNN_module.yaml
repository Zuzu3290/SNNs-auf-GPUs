architecture:
  input_size: 50
  hidden_size: 50
  hidden_layers: 5
  output_size: 10
  threshold: 0.5
  leak: 1.0
  override: false
  network_struct: S
  simulator: ON
  temporal_slice_duration: 15000
  temporal_overlap: 0
  total_time_window: 30000
  num_workers: 2

training:
  loss_function: CrossEntropy
  optimizer: Adam
  epochs: 10
  iterations_per_epoch: 100
  timesteps: 25
  batch_size: 128
  beta: 0.95
  nap_times: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  num_classes: 10
  device: cuda
  kernel: OFF
  DDP: OFF
  num_workers: 4
  use_amp: true
  grad_accum_steps: 1
  lr_scheduler: cosine

dataset:
  dataset_name: MNIST
  data_path:

output:
  output_dir: ./outputs
  plot_dir: ./outputs/plots
  data_dir: ./outputs/data
