# =============================================================================
# docker/docker-compose.yml
# =============================================================================
# Separates the pipeline into two services:
#
#   camera-bridge  — thin service with USB access, streams raw events
#                    over a Unix socket / shared memory
#   snn-compute    — GPU service, reads events, runs SNN inference
#
# This split lets you:
#   - Run the camera on a Jetson / Raspberry Pi (ARM, no GPU needed)
#   - Run heavy SNN compute on a separate x86 GPU server
#   - Replace either side independently
#
# Usage:
#   docker compose up                  # both services
#   docker compose up camera-bridge    # camera only
#   docker compose up snn-compute      # compute only (mock events)
#   docker compose down
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # camera-bridge: reads from hardware, writes events to shared volume
  # ---------------------------------------------------------------------------
  camera-bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: event-camera-snn:latest
    container_name: camera-bridge
    restart: unless-stopped

    # USB access for real cameras
    privileged: false
    devices:
      - /dev/bus/usb:/dev/bus/usb

    # Shared volume for event data (IPC between containers)
    volumes:
      - event-socket:/tmp/events
      - /run/udev:/run/udev:ro   # udev access for device enumeration

    environment:
      - CAMERA_BACKEND=${CAMERA_BACKEND:-mock}
      - SENSOR_WIDTH=${SENSOR_WIDTH:-346}
      - SENSOR_HEIGHT=${SENSOR_HEIGHT:-260}
      - EVENT_SOCKET=/tmp/events/camera.sock
      - WINDOW_US=10000

    command: >
      python3 -c "
      import sys; sys.path.insert(0, 'src/camera')
      from event_camera import EventCamera
      # Stream events to socket (simplified — use real IPC in production)
      cam = EventCamera(backend='mock')
      cam.start()
      import time, json, socket
      srv = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
      srv.bind('/tmp/events/camera.sock')
      srv.listen(1)
      print('[camera-bridge] Waiting for compute client...')
      conn, _ = srv.accept()
      for batch in cam.stream():
          payload = json.dumps({'count': batch.count}).encode() + b'\n'
          try: conn.sendall(payload)
          except: break
      cam.stop()
      "

    healthcheck:
      test: ["CMD", "test", "-S", "/tmp/events/camera.sock"]
      interval: 5s
      timeout: 3s
      retries: 10


  # ---------------------------------------------------------------------------
  # snn-compute: GPU inference, reads events from socket
  # ---------------------------------------------------------------------------
  snn-compute:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: event-camera-snn:latest
    container_name: snn-compute
    restart: unless-stopped
    depends_on:
      camera-bridge:
        condition: service_healthy

    # GPU access (requires nvidia-container-toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    volumes:
      - event-socket:/tmp/events
      - model-weights:/workspace/weights

    environment:
      - EVENT_SOCKET=/tmp/events/camera.sock
      - N_CLASSES=${N_CLASSES:-10}
      - MODEL_PATH=/workspace/weights/snn_model.pt
      - CUDA_VISIBLE_DEVICES=0

    command: >
      python3 pipeline.py
        --backend socket
        --n_classes ${N_CLASSES:-10}
        --n_frames 0

    # Expose metrics port (optional: Prometheus / Grafana integration)
    ports:
      - "8080:8080"


  # ---------------------------------------------------------------------------
  # monitor: optional live visualisation (web dashboard)
  # ---------------------------------------------------------------------------
  monitor:
    image: grafana/grafana:latest
    container_name: monitor
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    profiles:
      - monitoring   # only start with: docker compose --profile monitoring up


# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  event-socket:    # Unix socket between camera-bridge and snn-compute
  model-weights:   # persisted model checkpoints
  grafana-data:    # Grafana dashboards


# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  default:
    name: event-snn-net
