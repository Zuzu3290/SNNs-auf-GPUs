framing:
  mode: n_time_bins      # "n_time_bins" = fixed T, no padding, recommended
                         # "time_window" = variable T per recording, requires padding
  n_time_bins: 16        # frames per recording — only used when mode: n_time_bins
  time_window_ms: 15.0   # window duration  — only used when mode: time_window

dataset:
  name: N-MNIST          # N-MNIST | custom (set data_path for custom)
  data_path: ""          # leave empty to use N-MNIST default download path

preprocessing:
  denoise_filter_time_us: 10000  # remove noise events < this interval apart (microseconds)

augmentation:
  enabled: true
  rotation_deg: 10              # ±degrees for RandomRotation (training split only)

temporal_slicing:
  enabled: false
  slice_duration_ms: 15.0
  overlap_ms: 0.0        # keep at 0 to avoid duplicate training samples
  min_events_per_slice: 10
  discard_incomplete: false
  auto_tune: false
  events_per_slice: null # set an int to switch to event-driven mode (ignores slice_duration_ms)

cache:
  path: "./cache"
  avg_recording_bytes: 50000     # fallback only — pipeline auto-probes real sample size at startup
                                 # used only if probing fails (empty dataset, corrupt first sample)
  memory_safety_margin_gb: 2.0
  memory_cache_threshold_gb: 8.0
  max_cached_recordings: 500
  force_mode: null       # null | memory | disk | hybrid | no_cache
                         #
                         # null  = adaptive (recommended on workstations ≥32GB RAM)
                         #         probes available RAM, GPU pressure, dataset size → picks best strategy
                         #         → memory mode on 64GB workstation: epoch 2+ in ~5-15s (full dataset in RAM)
                         #         → hybrid mode on 32GB: disk + hot RAM buffer
                         #
                         # disk  = force DiskCachedDataset regardless of available RAM (use on Colab ≤16GB)
                         #         safe: workers don't duplicate cache; epoch 2+ ~120-160s
                         #
                         # memory = force in-memory LRU cache (only if you are certain RAM is sufficient)
                         # hybrid = force disk + RAM buffer (explicit override for hybrid)
                         # no_cache = disable caching entirely (slow: ToFrame reruns every epoch)

# batch_size and num_workers live in SNN_module.yaml (training section) — not here.
