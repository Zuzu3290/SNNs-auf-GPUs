framing:
  mode: n_time_bins      # "n_time_bins" = fixed T, no padding, recommended
                         # "time_window" = variable T per recording, requires padding
  n_time_bins: 16        # frames per recording — only used when mode: n_time_bins
  time_window_ms: 15.0   # window duration  — only used when mode: time_window

dataset:
  name: N-MNIST          # N-MNIST | custom (set data_path for custom)
  data_path: ""          # leave empty to use N-MNIST default download path

preprocessing:
  denoise_filter_time_us: 10000  # remove noise events < this interval apart (microseconds)

augmentation:
  enabled: true
  rotation_deg: 10              # ±degrees for RandomRotation (training split only)

temporal_slicing:
  enabled: false
  slice_duration_ms: 15.0
  overlap_ms: 0.0        # keep at 0 to avoid duplicate training samples
  min_events_per_slice: 10
  discard_incomplete: false
  auto_tune: false
  events_per_slice: null # set an int to switch to event-driven mode (ignores slice_duration_ms)

cache:
  path: "./cache"
  avg_recording_bytes: 50000     # estimated bytes per raw recording — used for memory budgeting
  memory_safety_margin_gb: 2.0
  memory_cache_threshold_gb: 8.0
  max_cached_recordings: 500
  force_mode: null       # null | memory | disk | hybrid | no_cache

dataloader:
  batch_size: 128
  num_workers: 4         # overridden at runtime by PipelineMemoryCoordinator
